boards = 5              # stated by human 2026-07-10
stage = 3               # Stage 3 gate passed 2026-07-10, re-passed after MCP23S17 rework same day: check-sch 0, lint-sch 0, emit-pcb 0 (audited: 274 pad-net checks). Stage 2 gate passed 2026-07-10 (see stage2_parts.md); previously Stage 1 gate passed: no matching blocks (both edablock
