                        # subcircuits go through Stage 2 parts + Stage 3 authoring:
                        # WeAct module socket, ESP32-S3 coprocessor, LDO rail,
                        # Victor bus interface (carried from rev 1), SD, headers.
                        # JP1/JP2 ESP-flash jumpers added later 2026-07-10; gate
                        # re-passed: check-sch 0, lint-sch 0, emit-pcb 0 (added=2,
                        # no footprint_changed), JP/J7/J8 pad-nets audited, PDF reviewed.

